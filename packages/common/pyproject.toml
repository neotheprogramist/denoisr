[project]
name = "denoisr-common"
version = "0.1.0"
description = "Shared runtime helpers for Denoisr workspace projects"
requires-python = ">=3.14"
classifiers = ["Private :: Do Not Upload"]
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/denoisr_common"]
