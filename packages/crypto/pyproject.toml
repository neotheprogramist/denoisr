[project]
name = "denoisr-crypto"
version = "0.1.0"
description = "Crypto market data, labeling, modeling, and tokenization tools"
requires-python = ">=3.14"
classifiers = ["Private :: Do Not Upload"]
dependencies = [
    "denoisr-common",
    "duckdb>=1.5.0",
    "numpy>=2.4.3",
    "polars>=1.38.1",
    "safetensors>=0.7.0",
    "torch>=2.10.0",
    "zstandard>=0.25.0",
]

[project.scripts]
denoisr-crypto-collect-binance = "denoisr_crypto.apps.collect_binance:main"
denoisr-crypto-build-features = "denoisr_crypto.apps.build_features:main"
denoisr-crypto-backtest-poc = "denoisr_crypto.apps.backtest_poc:main"
denoisr-crypto-train-poc = "denoisr_crypto.apps.train_poc:main"
denoisr-crypto-visualize-poc = "denoisr_crypto.apps.visualize_poc:main"
denoisr-crypto-validate-binance = "denoisr_crypto.apps.validate_binance:main"
denoisr-crypto-build-tokenizer-corpus = "denoisr_crypto.apps.build_tokenizer_corpus:main"
denoisr-crypto-train-fsq-tokenizer = "denoisr_crypto.apps.train_fsq_tokenizer:main"
denoisr-crypto-export-token-dataset = "denoisr_crypto.apps.export_token_dataset:main"
denoisr-crypto-build-entry-dataset = "denoisr_crypto.apps.build_entry_dataset:main"
denoisr-crypto-train-entry-model = "denoisr_crypto.apps.train_entry_model:main"

[tool.uv.sources]
denoisr-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/denoisr_crypto"]
