# Denoisr training pipeline configuration
# Run with: uv run denoisr-train
#
# All fields are optional. Omitted values use the defaults shown below.
# Override individual values via CLI: --only fetch,init,phase1

# ---------------------------------------------------------------------------
# Data acquisition
# ---------------------------------------------------------------------------
[data]

# Standard Lichess rated games (all Elos, .pgn.zst format).
# Browse available months at https://database.lichess.org/
pgn_url = "https://database.lichess.org/standard/lichess_db_standard_rated_2025-01.pgn.zst"
pgn_path = "data/lichess.pgn.zst"

# Stockfish binary (empty = auto-detect from PATH)
stockfish_path = ""
stockfish_depth = 10

# Maximum training examples to generate
max_examples = 2_000_000

# Data generation worker count.
# Set explicitly to use all available CPU workers on this machine.
workers = 129

# Directory for temporary memmap files during generation.
scratch_dir = "outputs/scratch"

# Save generated dataset in chunk shards with this many examples per shard.
# 0 = legacy single-file `training_data.pt`.
# ~720k examples is about 32 GiB of chunk buffers with current tensor schema
# (roughly 25% of a 128 GiB machine).
chunk_examples = 720000

# ---------------------------------------------------------------------------
# Model architecture
# ---------------------------------------------------------------------------
[model]

# Latent dimension per square token (all layers use this width)
d_s = 256

# Attention heads in the policy backbone (must divide d_s)
num_heads = 8

# Transformer depth
num_layers = 15

# Feed-forward hidden dimension
ffn_dim = 1024

# Diffusion timesteps (denoising schedule length)
num_timesteps = 100

# ---------------------------------------------------------------------------
# Phase 1 — Supervised policy + value training
# ---------------------------------------------------------------------------
[phase1]

lr = 3e-4
batch_size = 1024
warmup_epochs = 5
weight_decay = 1e-4

# ---------------------------------------------------------------------------
# Phase 2 — Diffusion world model bootstrapping
# ---------------------------------------------------------------------------
[phase2]

epochs = 200
lr = 3e-4
batch_size = 128

# Trajectory sequence length (consecutive board states per training example)
seq_len = 10

# Maximum game trajectories to extract from PGN
max_trajectories = 50_000

# ---------------------------------------------------------------------------
# Phase 3 — RL self-play with MCTS
# ---------------------------------------------------------------------------
[phase3]

generations = 1000
games_per_gen = 100
mcts_sims = 800

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
[output]

# All checkpoints, state files, and TensorBoard logs go here
dir = "outputs/"

# Run name for TensorBoard (empty = auto-timestamp)
run_name = ""
